name: Check Upstream Updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/honue/MediaInfoKeeper.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          new_commits=$(git log upstream/master ^origin/master --oneline --no-merges)
          if [ -z "$new_commits" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits."
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "$new_commits" > /tmp/new_commits.txt
            echo "Found new upstream commits:"
            cat /tmp/new_commits.txt
          fi

      - name: Create issue
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newCommits = fs.readFileSync('/tmp/new_commits.txt', 'utf8').trim();
            const title = '上游有新提交，需要同步';
            const body = [
              '上游 honue/MediaInfoKeeper 有新提交：',
              '',
              '```',
              newCommits,
              '```',
              '',
              '---',
              '**同步指令**（发给 AI）：',
              '',
              '读取 docs/bangumi-character-enhancement.md，按里面的上游同步步骤同步上游。Git 推送和 gh CLI 用 token，代码里不要写 token 明文。',
            ].join('\n');

            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: ['upstream-sync'],
              per_page: 10,
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const newIssue = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['upstream-sync'],
              });
              console.log(`Created issue #${newIssue.data.number}`);
            }
