name: Bug Report
description: 只提交可复现、有日志、已排除使用问题的 Bug
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        这里不是使用咨询区。

        只提交已经自行排查过、可以复现、并且提供完整日志文件的 Bug。使用方式错误等其他问题的 Issue，可能会被直接关闭。

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经使用最新可用插件，并确认 Emby 版本在支持范围内
          required: true
        - label: 我已经排除配置项、权限、路径或媒体文件本身导致的问题
          required: true
        - label: 我已经搜索过现有 Issues，没有找到相同问题
          required: true
        - label: 我已经使用 LLM 分析过日志，并会提供完整 Emby 日志文件
          required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 填写 MediaInfoKeeper 版本、Emby 完整版本和运行平台。
      placeholder: |
        MediaInfoKeeper：
        Emby：
        运行平台：
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题说明
      description: 说明问题、复现步骤、预期与实际结果，以及为什么认为这是 MediaInfoKeeper 的 Bug。
      placeholder: |
        问题：
        复现步骤：
        预期结果：
        实际结果：
        排查情况：
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件
      description: 必须上传完整 Emby 日志文件，或使用 Markdown 代码块粘贴完整日志内容。截图、片段、口头描述、“没有日志”都不算有效日志。提交前请自行删除隐私信息。
      render: text
      placeholder: |
        将完整日志文件拖到输入框，或按下面格式粘贴完整日志内容：

        ```
        在这里粘贴完整日志内容
        ```
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 可以补充相关配置、截图或其他信息。截图不能替代日志文件。
    validations:
      required: false
